# Reference config — deploy via Dashboard → New → Web Service (free tier).
# Blueprint is optional; copy these settings into the Web Service form.
services:
  - type: web
    name: flc-budget
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    # No persistent disk on free tier — SQLite lives in server/flcbudget.db
    # and resets when the instance is redeployed or restarted.
